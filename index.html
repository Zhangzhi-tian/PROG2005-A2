<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PROG2005 A2 Part1 - Inventory System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Inventory Management System</h1>

    <!-- 添加商品表单 -->
    <div class="form-section">
      <h3>Add New Item</h3>
      <input type="number" id="itemId" placeholder="Item ID" required>
      <input type="text" id="itemName" placeholder="Item Name" required>
      <input type="text" id="category" placeholder="Category" required>
      <input type="number" id="price" placeholder="Price ($)" step="0.01" required>
      <button onclick="addItem()">Add Item</button>
    </div>

    <!-- 功能按钮区 -->
    <div class="controls-section">
      <button onclick="showAllItems()">Show All Items</button>
      <input type="text" id="filterCategory" placeholder="Filter by Category">
      <button onclick="filterByCategory()">Filter</button>
      <button onclick="calculateTotalValue()">Calculate Total Value</button>
    </div>

    <!-- 结果输出区 -->
    <div class="output-section" id="output"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
